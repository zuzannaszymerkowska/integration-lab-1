name: Django Syntax Check
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8
      - name: Run linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics